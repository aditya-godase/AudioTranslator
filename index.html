<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English to Marathi Voice Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pulse animation for the listening state */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .listening-animation {
            animation: pulse-ring 1.5s infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800">

    <header class="bg-blue-600 text-white p-5 shadow-md text-center">
        <h1 class="text-2xl font-bold tracking-wide">English to Marathi Translator</h1>
        <p class="text-sm text-blue-200 mt-1">Tap, Speak, and Translate</p>
    </header>

    <main class="flex-grow flex flex-col p-4 space-y-4 max-w-md mx-auto w-full">
        
        <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex-grow">
            <h2 class="text-xs font-semibold text-slate-400 uppercase mb-2">You Said (English)</h2>
            <p id="englishText" class="text-lg text-slate-700 min-h-[3rem]">...</p>
        </div>

        <div class="bg-blue-50 p-5 rounded-xl shadow-sm border border-blue-100 flex-grow relative">
            <h2 class="text-xs font-semibold text-blue-400 uppercase mb-2">Translation (Marathi)</h2>
            <p id="marathiText" class="text-xl font-medium text-blue-900 min-h-[3rem]">...</p>
            
            <div id="loading" class="hidden absolute top-5 right-5 w-5 h-5 border-2 border-blue-400 border-t-blue-900 rounded-full animate-spin"></div>
        </div>

    </main>

    <div class="p-6 bg-white border-t border-slate-200 flex justify-center pb-8">
        <button id="micBtn" class="bg-blue-600 w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg transition-transform transform hover:scale-105 active:scale-95 focus:outline-none">
            <svg class="w-8 h-8 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
            </svg>
        </button>
    </div>

    <script>
        // DOM Elements
        const micBtn = document.getElementById('micBtn');
        const englishTextDisplay = document.getElementById('englishText');
        const marathiTextDisplay = document.getElementById('marathiText');
        const loadingIndicator = document.getElementById('loading');

        // State Management
        let isListening = false;

        // Initialize Speech Recognition (Chrome/Safari compatible)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false; // Stop automatically when user stops speaking
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            // Events
            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('bg-red-500', 'listening-animation');
                micBtn.classList.remove('bg-blue-600');
                englishTextDisplay.innerText = "Listening...";
                marathiTextDisplay.innerText = "...";
            };

            recognition.onspeechend = () => {
                recognition.stop();
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                englishTextDisplay.innerText = transcript;
                await processTranslation(transcript);
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('bg-red-500', 'listening-animation');
                micBtn.classList.add('bg-blue-600');
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                englishTextDisplay.innerText = "Error: Could not hear clearly. Try again.";
                stopListeningState();
            };
        } else {
            englishTextDisplay.innerText = "Speech Recognition API not supported in this browser. Please use Chrome on Android or Safari on iOS.";
        }

        // Handle Mic Button Tap
        micBtn.addEventListener('click', () => {
            if (!recognition) return alert('Browser not supported for voice input.');
            
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        // Helper: Reset button state
        function stopListeningState() {
            isListening = false;
            micBtn.classList.remove('bg-red-500', 'listening-animation');
            micBtn.classList.add('bg-blue-600');
        }

        // Core Pipeline: Translate -> Display -> Speak
        async function processTranslation(text) {
            try {
                loadingIndicator.classList.remove('hidden');
                
                // Note: Using MyMemory free API for prototyping. 
                // Production apps MUST use Google Cloud Translation or AWS Translate.
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|mr`);
                const data = await response.json();
                
                if(data && data.responseData) {
                    const translatedText = data.responseData.translatedText;
                    marathiTextDisplay.innerText = translatedText;
                    speakMarathi(translatedText);
                } else {
                    throw new Error("Translation failed");
                }
            } catch (error) {
                console.error("Translation API Error:", error);
                marathiTextDisplay.innerText = "Translation error. Please try again.";
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        }

        // Text-to-Speech (TTS)
        function speakMarathi(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'mr-IN'; // Marathi locale
                utterance.rate = 1; // Normal speed
                window.speechSynthesis.speak(utterance);
            } else {
                console.warn("Text-to-Speech not supported in this browser.");
            }
        }
    </script>
</body>
</html>
